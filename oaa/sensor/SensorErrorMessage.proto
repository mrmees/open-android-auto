/*
 * Sensor error message (msg ID 0x8004).
 *
 * Sent when a sensor request fails or a sensor becomes unavailable.
 * Direction: HU -> Phone.
 *
 * APK class: wbp (AA v16.1), wbf (AA v16.2)
 * Handler: ibi.java (16.2) logs sensor type (wbl) + error code (wbg).
 * Field 1 enum verified as SensorType (wbl) via verifier vym index 19.
 * Field 2 enum verified as SensorErrorStatus (wbg) via verifier vym index 18.
 */
syntax="proto2";

import "oaa/sensor/SensorTypeEnum.proto";
import "oaa/sensor/SensorErrorStatusEnum.proto";

package oaa.proto.messages;

// confidence: gold [deep_trace, 16.2 handler ibi.java]
message SensorError
{
    required enums.SensorType.Enum sensor_type = 1;  // 16.2: wbl  // confidence: gold
    required enums.SensorErrorStatus.Enum error_status = 2;  // 16.2: wbg  // confidence: gold
}
