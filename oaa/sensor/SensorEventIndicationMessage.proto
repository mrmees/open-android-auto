    optional int32 toll_status = 1; // int32  // confidence: silver [apk_static, cross_version]
    optional int32 toll_type = 2; // int32  // confidence: silver [apk_static, cross_version]
    optional TollRoadInfo info = 3; // sub-message  // confidence: silver [apk_static, cross_version]
}

