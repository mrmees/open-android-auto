syntax="proto2";

package oaa.proto.data;

// confidence: silver [apk_static, cross_version]
message Environment
{
    optional int32 temperature =1;  // confidence: silver [apk_static, cross_version]
    optional int32 pressure = 2;  // confidence: silver [apk_static, cross_version]
    optional int32 rain = 3;  // confidence: silver [apk_static, cross_version]
}
