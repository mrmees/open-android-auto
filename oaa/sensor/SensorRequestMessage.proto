/*
 * GAL-level sensor request message (msg ID 0x8001).
 *
 * Sent by the phone to request sensor data at a given refresh interval.
 * Direction: Phone -> HU.
 *
 * APK class: wbr (AA v16.1), wbh (AA v16.2)
 * Handler: ibi.java (16.2) builds and sends via m20133s().
 * Field 1 enum verified as SensorType (wbl) via verifier vym index 19.
 */
syntax="proto2";

import "oaa/sensor/SensorTypeEnum.proto";

package oaa.proto.messages;

// confidence: gold [deep_trace, 16.2 handler ibi.java]
message SensorRequest
{
    required enums.SensorType.Enum sensor_type = 1;  // 16.2: wbl enum  // confidence: gold
    required int64 refresh_interval = 2;  // Refresh interval in milliseconds  // confidence: gold
}
