    required int64 raw_meters = 1;  // confidence: silver [apk_static, cross_version]
    required fixed32 value = 2;  // confidence: silver [apk_static, cross_version]
    required fixed32 unit = 3;  // confidence: silver [apk_static, cross_version]
}

// APK class: xnc — distance label (fields 5-8, map entry with non-standard keys)
// confidence: silver [apk_static, cross_version]
message DistanceLabel
