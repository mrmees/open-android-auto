/*
 * Instrument Cluster messages (GAL channel type 10, NAVIGATION_STATUS)
 * Endpoint: ian.java (16.2), GAL type 10, log tag: CAR.INST
 * Service: hlj.java (16.2), log tag: CAR.INST
 *
 * This channel manages the instrument cluster display — a secondary
 * navigation display (e.g., behind the steering wheel). The cluster
 * configuration (dimensions, type, and proto-defined image options) is
 * advertised during service discovery via NavigationChannel config, but
 * current 16.2 source work does not prove a reachable NEXT_TURN_IMAGE /
 * NavigationImageOptions sender path for live native nav icons.
 *
 * Message IDs (from ian.java handler):
 *   0x8001 = InstrumentClusterStart   (HU→Phone, vze — empty signal)
 *   0x8002 = InstrumentClusterStop    (HU→Phone, vzf — empty signal)
 *   0x8003 = NavigationState          (Phone→HU, vzb — see NavigationStateMessage.proto)
 *   0x8005 = LegacyNavigationTurnEvent(Phone→HU, vyx @Deprecated — legacy turn data)
 *   0x8006 = NavigationNotification   (Phone→HU, vza — see NavigationNotificationMessage.proto)
 *   0x8007 = NavigationNextTurnDist   (Phone→HU, vyp — see NavigationTurnEventMessage.proto)
 *   0x8008 = VehicleEnergyForecast    (Phone→HU, waw — see VehicleEnergyForecastMessage.proto)
 *
 * On 0x8001, the phone reads cached CarInstrumentClusterInfo
 * (populated from service discovery config) and passes it to
 * listeners: min_interval, cluster_type, width, height, color_depth.
 *
 * 0x8004 existed in 16.1 (NavigationTurnEvent, vzm) and carried the older
 * turn-image-bytes field, but was removed in 16.2. Modern HUs (PDK >= 1.6)
 * use 0x8006/0x8007 instead, and the visible 16.2 legacy 0x8005 fallback is
 * maneuver/distance-only.
 *
 * APK: AA v16.2 (verified 2026-03-06)
 */

syntax = "proto2";

import "oaa/navigation/NavigationTurnEventMessage.proto";

package oaa.proto.messages;

