// 0x8005: Legacy NavigationTurnEvent (@Deprecated in 16.2)
// APK class: vyx (16.2) — 4 fields, proto2
// Direction: Phone→HU — phone sends turn info to legacy HUs (CarInfo PDK < 1.6);
// unlike 16.1's 0x8004, this visible 16.2 legacy fallback has no image-bytes field.
// Handler: ian.m20073h(maneuver, distance, distance_millis, distance_unit)
// Modern HUs receive 0x8006 (NavigationNotification) instead.
//
// NOTE: Our previous proto had InstrumentClusterInput (vzl) at 0x8005.
// That was WRONG — vzl is a display overlay parameters proto (OverlayParameters),
// not a wire message on this channel. The actual 0x8005 is vyx.
// confidence: gold [apk_deep_trace]
message LegacyNavigationTurnEvent {
    optional int32 maneuver_type = 1;     // APK: f74555c — maneuver type constant  // confidence: gold [apk_deep_trace]
    optional int32 turn_number = 2;       // APK: f74556d — distance value  // confidence: gold [apk_deep_trace]
    optional int32 turn_distance = 3;     // APK: f74557e — distance in millis  // confidence: gold [apk_deep_trace]
    optional DistanceDisplayUnit distance_unit = 4; // APK: f74558f — enum via vym, stored as value-1  // confidence: gold [apk_deep_trace]
}

