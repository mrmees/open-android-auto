/*
 * NavigationTurnEvent — turn-by-turn navigation detail.
 *
 * DEPRECATED in 16.2: Message ID 0x8004 existed in 16.1 (APK class vzm,
 * 6 fields: road_name, maneuver_type, turn_direction, turn_icon, distance_meters,
 * distance_unit). In 16.2, 0x8004 was removed entirely and vzm was reassigned
 * to an unrelated overlay parameter class (2 fields: int + float).
 *
 * Legacy replacement: 0x8005 (vyx, @Deprecated, 4 fields — see InstrumentClusterMessages.proto)
 * Modern replacement: 0x8006 NavigationNotification (vza) for modern HUs (PDK >= 1.6),
 * whose source-backed 16.1/16.2 native sender traces remain semantic-only.
 *
 * The sub-messages below (NavigationNextTurnDistanceEvent at 0x8007, etc.)
 * ARE still active and verified on the wire.
 *
 * In 16.1, field 4 carried legacy turn-image bytes sourced from app
 * NavigationStep.turnImage or locally synthesized fallback assets. Current 16.2
 * source work found no reachable native NEXT_TURN_IMAGE / NavigationImageOptions
 * successor path, so do not project this field forward past 0x8004.
 *
 * DHU 2.1 logcat (2026-02-28) showed NavigationTurnEvent at ~1Hz during nav,
 * but that was the GMS Car App Library TurnEvent, not this wire message.
 */

syntax = "proto2";

import "oaa/navigation/ManeuverTypeEnum.proto";
import "oaa/navigation/TurnSideEnum.proto";
import "oaa/navigation/NavigationDistanceDisplayData.proto";

package oaa.proto.messages;

// DEPRECATED — 16.1 only (msg ID 0x8004, APK class vzm)
// Removed in 16.2. Modern HUs use NavigationNotification (0x8006) instead.
// Kept for reference and 16.1 compatibility.
// confidence: silver [apk_static, 16.1_only]
message NavigationTurnEvent {
    optional string road_name = 1; // APK: vzm.b (16.1)  // confidence: silver [apk_static]
    optional oaa.proto.enums.ManeuverType.Enum maneuver_type = 2; // APK: vzm.c (16.1)  // confidence: silver [apk_static]
    optional oaa.proto.enums.TurnSide.Enum turn_direction = 3; // APK: vzm.d (16.1)  // confidence: silver [apk_static]
    optional bytes turn_icon = 4; // APK: vzm.e (16.1) — legacy turn-image bytes on deprecated 0x8004  // confidence: silver [apk_static]
    optional int32 distance_meters = 5; // APK: vzm.f (16.1)  // confidence: silver [apk_static]
    optional int32 distance_unit = 6; // APK: vzm.g (16.1)  // confidence: silver [apk_static]
}

// APK class: vzg — turn distance with display text and unit
// Distinct from NavigationDistance (xnb) which has unknown message ID.
// confidence: silver [apk_static, cross_version]
enum DistanceDisplayUnit {
    DISTANCE_UNIT_UNKNOWN = 0;
    DISTANCE_UNIT_METERS = 1;
    DISTANCE_UNIT_KILOMETERS = 2;
    DISTANCE_UNIT_MILES = 3;
    DISTANCE_UNIT_FEET = 4;
    DISTANCE_UNIT_YARDS = 5;
    DISTANCE_UNIT_UNKNOWN_6 = 6; // Observed on wire (2026-03-04) — seen in stationary capture, may be a placeholder or locale-specific unit. Needs driving capture to confirm.
}

// confidence: silver [apk_static, cross_version]
message NavigationTurnDistance {
    optional int32 distance_value = 1; // APK: int32  // confidence: silver [apk_static, cross_version]
    optional string display_text = 2; // APK: string  // confidence: silver [apk_static, cross_version]
    optional DistanceDisplayUnit distance_unit = 3; // APK: enum  // confidence: silver [apk_static, cross_version]
}

// APK class: vzf — destination distance with remaining time
// Sub-message ref: vzg (NavigationTurnDistance)
// confidence: silver [apk_static, cross_version]
message DestinationDistance {
    optional NavigationTurnDistance distance = 1; // APK: message (vzg)  // confidence: silver [apk_static, cross_version]
    optional string destination_name = 2; // APK: string  // confidence: silver [apk_static, cross_version]
    optional int64 eta_timestamp = 3; // APK: int64  // confidence: silver [apk_static, cross_version]
}

// APK class: vzv — remaining distance to destination
// Sub-message ref: vzg (NavigationTurnDistance)
// confidence: silver [apk_static, cross_version]
message NavigationRemainingDistance {
    optional NavigationTurnDistance distance = 1; // APK: message (vzg)  // confidence: silver [apk_static, cross_version]
    optional int64 remaining_meters = 2; // APK: int64  // confidence: silver [apk_static, cross_version]
}

// APK class: vzn — simple string wrapper used in turn distance event
// confidence: silver [apk_static, cross_version]
message NavigationTurnLabel {
    optional string label = 1; // APK: string  // confidence: silver [apk_static, cross_version]
}

// APK class: vzd — next turn distance event with remaining and step distances
// Sub-message refs: vzv (NavigationRemainingDistance), vzn (NavigationTurnLabel)
// Message ID: 0x8007 (32775) on Navigation channel — WIRE VERIFIED (2026-03-04)
// Wire payload: {1: {1: {2: "0", 3: 6}}} = remaining_distance.distance.display_text="0", distance_unit=6
// Previously misattributed to NavigationDistance (xnb); wire type mismatch proved it wrong.
// confidence: gold [apk_static, cross_version, wire_verified]
message NavigationNextTurnDistanceEvent {
    optional NavigationRemainingDistance remaining_distance = 1; // APK: message (vzv)  // confidence: silver [apk_static, cross_version]
    repeated NavigationTurnLabel turn_labels = 2; // APK: repeated message (vzn)  // confidence: silver [apk_static, cross_version]
    optional NavigationStepDistance step_distance = 3; // APK: message — forward ref  // confidence: silver [apk_static, cross_version]
}

// APK class: xmv — step distance with raw distance value
// Sub-message ref: xmw (NavigationDistanceValue, in NavigationDistanceDisplayData.proto)
// confidence: silver [apk_static, cross_version]
message NavigationStepDistance {
    optional data.NavigationDistanceValue distance_value = 1; // APK: message (xmw)  // confidence: silver [apk_static, cross_version]
    optional int64 distance_meters = 2; // APK: int64  // confidence: silver [apk_static, cross_version]
}
