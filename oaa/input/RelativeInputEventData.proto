syntax="proto2";

package oaa.proto.data;

// APK class: wbb (16.2), wbl (16.1) — single rotary/scroll event
// confidence: gold [handler_trace, deep_apk]
message RelativeInputEvent
{
    required uint32 scan_code = 1;  // axis identifier (only 65536/ROTARY recognized)
    required int32 delta = 2;       // signed scroll amount
}
