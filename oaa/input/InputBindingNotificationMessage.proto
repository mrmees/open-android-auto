/*
 * Haptic feedback notification — Phone→HU, msg 0x8004.
 *
 * Phone requests haptic feedback from the HU. Only sent if the
 * haptic type was advertised in InputChannelConfig.supported_haptic_types.
 *
 * APK class: vxi (16.2), vxw (16.1)
 * Sent by hlg.m18746o, enum verified via vve case 12 → vwy.
 */
syntax="proto2";

import "oaa/input/HapticFeedbackTypeEnum.proto";

package oaa.proto.messages;

// confidence: gold [handler_trace, deep_apk]
message InputBindingNotification
{
    optional enums.HapticFeedbackType.Enum feedback_type = 1;
}
