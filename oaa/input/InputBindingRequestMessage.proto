/*
 * Input binding request — Phone→HU, msg 0x8002.
 *
 * Phone echoes back the supported keycodes from InputChannelConfig
 * to acknowledge which keycodes it will handle.
 *
 * APK class: vxr (16.2), wbl (16.1)
 * Sent by hlg.mo18727r after SDP input channel discovery.
 */
syntax="proto2";

package oaa.proto.messages;

// confidence: gold [handler_trace, deep_apk]
message InputBindingRequest
{
    repeated int32 keycodes = 1 [packed = true];  // supported keycodes echoed from InputChannelConfig
}
