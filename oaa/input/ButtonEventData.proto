syntax="proto2";

package oaa.proto.data;

// confidence: silver [apk_static, cross_version]
message ButtonEvent
{
    optional uint32 scan_code = 1;  // confidence: silver [apk_static, cross_version]
    optional bool is_pressed = 2;  // confidence: silver [apk_static, cross_version]
    optional uint32 meta = 3;  // confidence: silver [apk_static, cross_version]
    optional bool long_press = 4;  // confidence: silver [apk_static, cross_version]
}
