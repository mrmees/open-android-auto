syntax="proto3";

package oaa.proto.enums;

// Maps to Android MotionEvent actions via hlg.java static init (SparseIntArray)
// Values 3 and 4 are not mapped (default to ACTION_DOWN)
// confidence: gold [handler_trace, deep_apk]
message TouchAction
{
    enum Enum
    {
        PRESS = 0;          // ACTION_DOWN — first pointer down
        RELEASE = 1;        // ACTION_UP — last pointer up
        DRAG = 2;           // ACTION_MOVE — pointer moved
        POINTER_DOWN = 5;   // ACTION_POINTER_DOWN — additional pointer down
        POINTER_UP = 6;     // ACTION_POINTER_UP — non-last pointer up
    }
}
