proto: oaa/media/MediaPlaybackCommandMessage.proto
message: MediaPlaybackCommand
confidence: retracted
last_updated: '2026-03-06'
retraction:
  date: '2026-03-06'
  reason: >
    Deep APK trace proved this message does not exist. The mapped APK class
    vuy (16.2) / vvm (16.1) is actually ActionTakenNotification on the video
    channel (msg ID 0x800D), not a media playback command on channel 10.
    The phone-side media handler (qnf.java) has no handler for 0x8002.
    The GAL protocol reference (DHU 2.1) lists no MediaPlaybackCommand.
    Media control flows through the input channel as KeyEvent button presses.
  evidence:
    - "huz.java (CAR.VIDEO) line 258-265: only caller of vuy, sends as 0x800D"
    - "qnf.java (CAR.GAL.MEDIA): only handles 0x8004, 0x8005, 0x800D"
    - "GAL protocol reference: 196 msg types, no MediaPlaybackCommand"
