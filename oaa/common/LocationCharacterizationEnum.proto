/*
 * Location characterization bitmask — describes the quality/source of
 * GPS location data provided by the head unit's sensor channel.
 *
 * Used as a bitmask: values can be OR'd together to describe multiple
 * characteristics of the location fix. For example, a dead-reckoned
 * position using gyroscope and wheel speed would be:
 *   GYROSCOPE_FUSION | WHEEL_SPEED_FUSION | DEAD_RECKONED = 2 + 16 + 128 = 146
 *
 * Referenced by: SensorChannelConfig field 2 (location_characterization),
 *   class wbk in 16.2. Logged as "locationCharacterization=<value>" by
 *   qlz.java:185 and hyy.java:194. Phone treats as opaque uint32 —
 *   stores and returns without testing individual bits.
 *
 * Source: opencardev/aasdk (GPLv3), cross-referenced with AA APK
 * Original: aap_protobuf/shared/LocationCharacterization.proto
 *
 * confidence: silver [cross_referenced, apk_field_confirmed]
 */

syntax = "proto2";

package oaa.proto.enums;

// Bitmask values — combine with bitwise OR
// 16.2: field 2 of wbk (SensorChannelConfig), uint32
// Phone stores as opaque value — individual bits only meaningful to HU
// confidence: silver [cross_referenced, apk_field_confirmed]
enum LocationCharacterization {
    LOCATION_PRIOR_LOCATIONS = 1;           // Uses prior location history
    LOCATION_GYROSCOPE_FUSION = 2;          // Gyroscope-aided positioning
    LOCATION_ACCELEROMETER_FUSION = 4;      // Accelerometer-aided positioning
    LOCATION_COMPASS_FUSION = 8;            // Compass/magnetometer-aided
    LOCATION_WHEEL_SPEED_FUSION = 16;       // Vehicle wheel speed sensor
    LOCATION_STEERING_ANGLE_FUSION = 32;    // Steering angle sensor
    LOCATION_CAR_SPEED_FUSION = 64;         // Vehicle speed (OBD/CAN)
    LOCATION_DEAD_RECKONED = 128;           // Dead reckoning (no live GPS)
    LOCATION_RAW_GPS_ONLY = 256;            // Raw GPS with no sensor fusion
}
