// 0x801A: RadioProgramListNotification (16.2: wam, 16.1: wau)
// Full list of available radio programs.
// confidence: silver [apk_static, cross_version]
message RadioProgramListNotification {
    repeated RadioProgramInfo programs = 1;  // confidence: silver [apk_static, cross_version]
}

// 0x801B: RadioProgramInfoNotification (16.2: wal, 16.1: wat)
// Current program info update (e.g., station changed, metadata updated).
// confidence: silver [apk_static, cross_version]
message RadioProgramInfoNotification {
    optional RadioProgramInfo program_info = 1;  // confidence: silver [apk_static, cross_version]
    optional bool is_muted = 2;  // confidence: silver [apk_static, cross_version]
    optional bool has_audio_focus = 3;  // confidence: silver [apk_static, cross_version]
}

// 0x801D: RadioMuteResponse (16.2: wah, 16.1: wap)
// Response to mute request.
// confidence: silver [apk_static, cross_version]
message RadioMuteResponse {
    optional bool is_muted = 1;  // confidence: silver [apk_static, cross_version]
}

// 0x801F: RadioTuneResponse (16.2: wau, 16.1: wbd)
// Response to tune request with status.
// confidence: silver [apk_static, cross_version]
message RadioTuneResponse {
    optional RadioTuneStatus status = 1;  // confidence: silver [apk_static, cross_version]
}

// 0x8020: RadioFavoriteListNotification (16.2: wad, 16.1: wal)
// List of favorite/preset programs.
// confidence: silver [apk_static, cross_version]
message RadioFavoriteListNotification {
    repeated RadioProgramInfo favorites = 1;  // confidence: silver [apk_static, cross_version]
}

