/*
 * Radio channel messages (GAL channel type 15, RADIO)
 * Handler: ibf.java (16.2), log tag: CAR.GAL.RADIO-EP
 * Service: hlr.java (16.2), log tag: CAR.RADIO
 *
 * Provides broadcast radio control — AM/FM, HD Radio, DAB/DMB.
 * Maps to Android's android.hardware.radio broadcast radio HAL concepts:
 * program selectors with identifier types, station metadata, song info,
 * and control operations (mute, tune, favorites).
 *
 * NOTE: ibf extends iav directly — NO vdp.m36513at() +1 offset.
 * Wire IDs = switch case values in ibf.mo18864a.
 *
 * Message IDs (directions CORRECTED 2026-03-06):
 *   0x801A = RadioProgramListNotification     (HU→Phone, wam/16.2)
 *   0x801B = RadioProgramInfoNotification     (HU→Phone, wal/16.2)
 *   0x801C = RadioMuteRequest                 (Phone→HU, wag/16.2)
 *   0x801D = RadioMuteResponse                (HU→Phone, wah/16.2)
 *   0x801E = RadioTuneRequest                 (Phone→HU, wat/16.2)
 *   0x801F = RadioTuneResponse                (HU→Phone, wau/16.2)
 *   0x8020 = RadioFavoriteListNotification    (HU→Phone, wad/16.2)
 *   0x8021 = RadioFavoriteToggleRequest       (Phone→HU, waq/16.2)
 *   0x8022 = RadioTuneDirectionRequest        (Phone→HU, war/16.2)
 *   0x8023 = RadioSearchRequest               (Phone→HU, wac/16.2) — NEW
 *
 * Callback interface (psq/16.2): onProgramList, onProgramInfo, onMute,
 *   onTune, onFavoriteList
 * Manager interface (psn/16.2): setMute, tuneToProgram, tuneDirection,
 *   toggleFavorite, search, registerCallback
 *
 * Service discovery config: see oaa/control/RadioChannelData.proto
 *
 * APK: AA v16.1 (originally), v16.2 (verified 2026-03-06)
 */

syntax = "proto2";

import "oaa/radio/RadioProgramTypeSchemaEnum.proto";

package oaa.proto.messages;

// ============================================================================
// Enums
// ============================================================================

// Radio program identifier type (APK enum: waq — unobfuscated)
// confidence: silver [apk_static, cross_version]
enum RadioIdentifierType {
    IDENTIFIER_TYPE_INVALID = 0;
    IDENTIFIER_TYPE_AMFM_FREQUENCY = 1;
    IDENTIFIER_TYPE_RDS_PI = 2;
    IDENTIFIER_TYPE_HD_STATION_ID_EXT = 3;
    IDENTIFIER_TYPE_HD_STATION_NAME = 4;
    IDENTIFIER_TYPE_DAB_DMB_SID_EXT = 5;
    IDENTIFIER_TYPE_DAB_ENSEMBLE = 6;
    IDENTIFIER_TYPE_DAB_SCID = 7;
    IDENTIFIER_TYPE_DAB_FREQUENCY = 8;
    IDENTIFIER_TYPE_DAB_SID_EXT = 9;
}

// Tune response status (APK: a.by, values 1-4)
// confidence: silver [apk_static, cross_version]
enum RadioTuneStatus {
    RADIO_TUNE_STATUS_UNKNOWN = 0;
    RADIO_TUNE_STATUS_SUCCESS = 1;
    RADIO_TUNE_STATUS_FAILURE = 2;
    RADIO_TUNE_STATUS_TIMEOUT = 3;
    RADIO_TUNE_STATUS_CANCELLED = 4;
}

// Tune direction for seek/step (APK: viz.M, values 1-2)
// confidence: silver [apk_static, cross_version]
enum RadioTuneDirection {
    RADIO_TUNE_DIRECTION_UNKNOWN = 0;
    RADIO_TUNE_DIRECTION_UP = 1;
    RADIO_TUNE_DIRECTION_DOWN = 2;
}

// ============================================================================
// Sub-messages
// ============================================================================

// APK class: war → SafeParcelable: RadioProgramIdentifier
// Identifies a specific radio program/station.
// confidence: silver [apk_static, cross_version]
message RadioProgramIdentifier {
    optional RadioIdentifierType type = 1;  // confidence: silver [apk_static, cross_version]
    optional uint64 value = 2; // Frequency in Hz for AM/FM, or station ID for HD/DAB  // confidence: silver [apk_static, cross_version]
}

// APK class: wav → SafeParcelable: RadioProgramSelector
// Selects a program via primary + optional secondary identifiers.
// confidence: silver [apk_static, cross_version]
message RadioProgramSelector {
    optional RadioProgramIdentifier primary_identifier = 1;  // confidence: silver [apk_static, cross_version]
    repeated RadioProgramIdentifier secondary_identifiers = 2;  // confidence: silver [apk_static, cross_version]
}

// APK class: wam — station icon or album art image data
// confidence: silver [apk_static, cross_version]
message RadioImage {
    optional bytes image_data = 1;  // confidence: silver [apk_static, cross_version]
}

// APK class: waw → SafeParcelable: RadioProgramType
// Program type classification (RDS PTY / ITU).
// confidence: silver [apk_static, cross_version]
message RadioProgramType {
    optional enums.RadioProgramTypeSchema.Enum schema = 1; // APK: viz.M (1=RDS_PTY, 2=ITU)  // confidence: silver [apk_static, cross_version]
    optional uint32 code = 2;  // confidence: silver [apk_static, cross_version]
}

// APK class: wbb → SafeParcelable: RadioSongMetadata
// Currently playing song information.
// confidence: silver [apk_static, cross_version]
message RadioSongMetadata {
    optional string title = 1;  // confidence: silver [apk_static, cross_version]
    optional string artist = 2;  // confidence: silver [apk_static, cross_version]
    optional string album = 3;  // confidence: silver [apk_static, cross_version]
    optional string genre = 4;  // confidence: silver [apk_static, cross_version]
    optional RadioImage album_art = 5;  // confidence: silver [apk_static, cross_version]
    optional uint64 duration_seconds = 6;  // confidence: silver [apk_static, cross_version]
}

// APK class: wan → SafeParcelable: RadioMetadata
// Full station metadata including HD Radio and DAB fields.
// confidence: silver [apk_static, cross_version]
message RadioMetadata {
    optional string station_name = 1;  // confidence: silver [apk_static, cross_version]
    optional string station_name_short = 2;  // confidence: silver [apk_static, cross_version]
    optional string station_name_long = 3;  // confidence: silver [apk_static, cross_version]
    optional RadioProgramType program_type = 4;  // confidence: silver [apk_static, cross_version]
    optional RadioImage station_icon = 5;  // confidence: silver [apk_static, cross_version]
    optional RadioSongMetadata song_metadata = 6;  // confidence: silver [apk_static, cross_version]
    optional string message = 7; // Station text message / RDS RadioText  // confidence: silver [apk_static, cross_version]
    optional string service_name = 8; // DAB service name  // confidence: silver [apk_static, cross_version]
    optional uint32 hd_sub_channels_available = 9;  // confidence: silver [apk_static, cross_version]
    optional bool hd_signal_acquired = 10;  // confidence: silver [apk_static, cross_version]
    optional bool hd_audio_acquired = 11;  // confidence: silver [apk_static, cross_version]
    optional string dab_component_name = 12;  // confidence: silver [apk_static, cross_version]
    optional bool dts_autostage_enriched = 13;  // confidence: silver [apk_static, cross_version]
}

// APK class: was → SafeParcelable: RadioProgramInfo
// A radio program entry — selector + metadata.
// confidence: silver [apk_static, cross_version]
message RadioProgramInfo {
    optional RadioProgramSelector program_selector = 1;  // confidence: silver [apk_static, cross_version]
    optional RadioMetadata metadata = 2;  // confidence: silver [apk_static, cross_version]
}

