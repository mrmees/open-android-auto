syntax="proto2";

import "oaa/av/AVStreamTypeEnum.proto";
import "oaa/av/AndroidKeycodeEnum.proto";
import "oaa/audio/AudioTypeEnum.proto";
import "oaa/audio/AudioConfigData.proto";
import "oaa/video/VideoConfigData.proto";
import "oaa/video/DisplayTypeEnum.proto";
import "oaa/video/VideoFocusReasonEnum.proto";
package oaa.proto.data;

// confidence: silver [apk_static, cross_version]
message AVChannel
{
    optional enums.AVStreamType.Enum stream_type = 1;  // confidence: silver [apk_static, cross_version]
    optional enums.AudioType.Enum audio_type = 2;  // confidence: silver [apk_static, cross_version]
    repeated AudioConfig audio_configs = 3;  // confidence: silver [apk_static, cross_version]
    repeated VideoConfig video_configs = 4;  // confidence: silver [apk_static, cross_version]
    // Field 5: APK has uint32 here, not bool. Not present in phone-side proto. Removed.

    // Fields 6-9 discovered via APK decompilation (vys.java, AA v16.1).
    optional uint32 channel_id = 6; // Display/channel identifier (assigned by phone)  // confidence: silver [apk_static, cross_version]
    optional enums.DisplayType.Enum display_type = 7; // MAIN, CLUSTER, AUXILIARY  // confidence: silver [apk_static, cross_version]
    optional enums.AndroidKeycode.Enum keycode = 8; // Android keycode (APK enum: vyh.java)  // confidence: silver [apk_static, cross_version]
    optional enums.VideoFocusReason.Enum focus_reason = 9; // Why video focus was set  // confidence: silver [apk_static, cross_version]
}
