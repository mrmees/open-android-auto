/*
 * WifiCredentialsResponse — HU sends WiFi credentials to phone via GAL channel.
 *
 * APK class: wcw.java (AA v16.2)
 * GAL handler: ibr.java (service type 17, CAR.GAL.WIFI_PROJ)
 * Wire msg ID: 0x8002 (CREDENTIALS_RESPONSE)
 * Direction: HU → Phone
 *
 * This is the ONLY message on the WiFi Projection GAL channel.
 * The phone stores the credentials in CarInfoInternal and initiates
 * WiFi connection. If status indicates failure or security_mode is
 * unknown, the phone discards the credentials.
 *
 * NOTE: Most other WiFi protos in oaa/wifi/ are BT RFCOMM setup
 * messages (dispatched by ngh.java), NOT GAL wire messages.
 */

syntax = "proto2";

package oaa.proto.messages;

// 16.2 class: wcw — 4 fields (1,2,3,5)
// confidence: gold [deep_trace]
message WifiCredentialsResponse {
    optional string ssid = 1;              // WiFi network SSID  // confidence: gold [deep_trace]
    optional WifiCredentialSecurityMode security_mode = 2;  // confidence: gold [deep_trace]
    optional string passphrase = 3;        // WiFi network passphrase/key  // confidence: gold [deep_trace]
    // field 4: not present
    optional WifiCredentialStatus status = 5;  // confidence: gold [deep_trace]
}

// Sequential re-indexing of WiFi security modes.
// Unlike BT RFCOMM WifiSecurityMode (non-sequential: 0,1,2,3,4,8,12,20,24,28,32,40),
// the GAL version uses sequential values 0-11.
// Validator: C0000a.m129bx (accepts 0-11)
// confidence: gold [deep_trace]
enum WifiCredentialSecurityMode {
    SECURITY_UNKNOWN = 0;
    SECURITY_OPEN = 1;
    SECURITY_WEP_64 = 2;
    SECURITY_WEP_128 = 3;
    SECURITY_WPA_PERSONAL = 4;
    SECURITY_WPA2_PERSONAL = 5;
    SECURITY_WPA_WPA2_PERSONAL = 6;
    SECURITY_WPA_ENTERPRISE = 7;
    SECURITY_WPA2_ENTERPRISE = 8;
    SECURITY_WPA_WPA2_ENTERPRISE = 9;
    SECURITY_WPA3_PERSONAL = 10;
    SECURITY_WPA2_WPA3_PERSONAL = 11;
}

// 0 = success (phone proceeds to connect), 1 = failure (credentials discarded)
// Validator: C0000a.m91bL (accepts 0-1)
// confidence: gold [deep_trace]
enum WifiCredentialStatus {
    CREDENTIAL_STATUS_OK = 0;
    CREDENTIAL_STATUS_FAILED = 1;
}
