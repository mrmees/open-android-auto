/*
 * Control channel configuration wrapper message.
 *
 * Top-level wrapper that carries ControlChannelConfig on the control channel.
 *
 * APK class: wcx (AA v16.1) — WARNING: wcx in 16.2 = WifiProjectionData (DIFFERENT proto!)
 * 16.2 equivalent: wcn (ControlChannelConfigWrapper), used in VERSION_RESPONSE when protocol >= 1.6
 * The three-layer nesting (Wrapper→Config→Params) may have been restructured in 16.2.
 * Field numbers decoded from protobuf-lite RawMessageInfo descriptor.
 */
syntax="proto2";

import "oaa/control/ControlChannelConfigData.proto";

package oaa.proto.messages;

// confidence: silver [apk_static, cross_version]
message ControlChannelConfigWrapper
{
    optional data.ControlChannelConfig config = 1; // APK: vxc  // confidence: silver [apk_static, cross_version]
}
