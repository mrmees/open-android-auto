/*
 * Bye-bye (shutdown) response message (msg ID 16 = SHUTDOWN_RESPONSE).
 *
 * Empty acknowledgment sent in response to a shutdown request.
 * No payload — presence of the message is the signal.
 *
 * APK class: vvs (16.2), vwg (16.1)
 * Direction: Bidirectional — both HU and phone can send
 * Handler: hzh.java case 16 (receive), case 15 sends vvs as response
 * APK logs: "send ByeByeResponse", "received ByeByeResponse"
 */
syntax="proto2";

package oaa.proto.messages;

// confidence: gold [apk_deep_trace]
message ByeByeResponse
{
}
