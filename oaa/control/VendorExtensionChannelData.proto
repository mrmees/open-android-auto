package oaa.proto.data;

// confidence: silver [apk_static, cross_version]
message VendorExtensionChannel
{
    optional string name = 1;  // confidence: silver [apk_static, cross_version]
    repeated string package_white_list = 2;  // confidence: silver [apk_static, cross_version]
    optional bytes data = 3;  // confidence: silver [apk_static, cross_version]
}
