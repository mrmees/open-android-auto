/*
 * Battery Status Notification (msg ID 23 on control channel).
 *
 * Phone reports its battery status to the head unit.
 * Requires protocol version >= 1.4.
 *
 * APK class: vvi (16.2)
 * Sender: hna.java line 1369 via hzh.m20106k(23, ...)
 * Direction: Phone->HU (not received by phone handler)
 * Battery level from BatteryManager.EXTRA_LEVEL.
 * Time from getBatteryDischargePrediction() (API 31+) or manual fallback.
 */
syntax="proto2";

package oaa.proto.messages;

// confidence: gold [apk_deep_trace]
message BatteryStatusNotification {
    optional uint32 battery_level = 1;  // percentage  // confidence: gold [apk_deep_trace]
    optional uint32 time_remaining_s = 2;  // discharge time in seconds  // confidence: gold [apk_deep_trace]
    optional bool critical_battery = 3;  // confidence: gold [apk_deep_trace]
}
