/*
 * RadioChannelConfig — radio channel SDP configuration for ServiceDiscovery.
 *
 * REWRITTEN for 16.2: Old RadioStation/RadioBand hierarchy (16.1: way/wax/wbe)
 * completely replaced by RadioChannelConfig/RadioBands/RadioBandGroup (wap/wab/waa).
 *
 * RadioCodecType and RadioRegion enums are NOT used in SDP anymore (only in GAL messages).
 */

syntax = "proto2";

import "oaa/radio/RadioBandTypeEnum.proto";

package oaa.proto.data;

// APK class: wap (16.2) — radio channel config container
// Replaces RadioChannel(way) from 16.1
// confidence: gold [deep_trace_verified, 16.2_jadx]
message RadioChannelConfig {
    optional int32 config_id = 1;  // purpose TBD — possibly config version or tuner ID  // confidence: silver [structure_verified]
    optional RadioBands bands = 2;  // confidence: gold [deep_trace_verified, 16.2_jadx]
}

// APK class: wab (16.2) — radio bands container
// confidence: gold [deep_trace_verified, 16.2_jadx]
message RadioBands {
    repeated RadioBandGroup groups = 1;  // confidence: gold [deep_trace_verified, 16.2_jadx]
}

// APK class: waa (16.2) — radio band group
// confidence: gold [deep_trace_verified, 16.2_jadx]
message RadioBandGroup {
    repeated enums.RadioBandType.Enum band_types = 1;  // AM=1, FM=2, DAB=3  // confidence: gold [deep_trace_verified, 16.2_jadx]
    optional bool hide_empty_group = 2;  // confidence: gold [deep_trace_verified, 16.2_jadx]
    optional string band_scan_action = 3;  // confidence: gold [deep_trace_verified, 16.2_jadx]
}
