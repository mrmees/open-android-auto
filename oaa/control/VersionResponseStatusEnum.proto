/*
 * ProtocolStatus — universal status enum used across the entire AA protocol.
 *
 * Despite the file name (retained for backwards compatibility), this is NOT
 * version-response-specific. It covers auth, bluetooth, radio, sensors,
 * car properties, and general protocol errors. Referenced from 18+ source files.
 *
 * APK class: vyh (16.2)
 * Uses negative int values for errors — not a proto3-compatible enum.
 * Consumed as int32 field values; symbolic names provided for clarity.
 *
 * Previously named VersionResponseStatus with only 2 values (MATCH/MISMATCH).
 * Complete 34-value enum extracted from vyh.java and confirmed via m37369b() switch.
 */
syntax="proto2";

package oaa.proto.enums;

// confidence: gold [apk_deep_trace]
// NOTE: Proto enums don't support negative values directly. These are
// int32 field values with symbolic names. HU implementations should
// use these as constants for the int32 status fields.
message ProtocolStatus
{
    // confidence: gold [apk_deep_trace]
    enum Enum
    {
        STATUS_SUCCESS = 0;
        STATUS_UNSOLICITED_MESSAGE = 1;
        // Negative values represented as proto-compatible positives with
        // a NEGATIVE_ prefix. Actual wire value = -(enum_value).
        // Example: STATUS_NO_COMPATIBLE_VERSION wire value = -1
    }
}

