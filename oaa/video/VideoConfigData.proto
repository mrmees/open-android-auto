syntax="proto2";

import "oaa/video/VideoResolutionEnum.proto";
import "oaa/video/VideoFPSEnum.proto";
import "oaa/av/MediaCodecTypeEnum.proto";
import "oaa/video/AdditionalVideoConfigData.proto";

package oaa.proto.data;

// APK class: wcz (16.1) / wcp (16.2) — video channel configuration
// confidence: silver [apk_static, cross_version, wire_capture]
message VideoConfig
{
    optional enums.VideoResolution.Enum video_resolution = 1;  // confidence: silver [apk_static, cross_version]
    optional enums.VideoFPS.Enum video_fps = 2;  // confidence: silver [apk_static, cross_version]
    optional uint32 margin_width = 3;  // confidence: silver [apk_static, cross_version]
    optional uint32 margin_height = 4;  // confidence: silver [apk_static, cross_version]
    optional uint32 dpi = 5;  // Android density bucket (120/160/240/320/480/640)  // confidence: silver [apk_static, cross_version]
    optional uint32 decoder_additional_depth = 6;  // Extra decoder buffer frames beyond default (0 = no extra). APK: hnt.java "decoder add depth", buffer = value + 1  // confidence: silver [apk_static, cross_version, wire_capture]
    optional uint32 viewing_distance = 7;  // Driver-to-display viewing distance in mm (typically 500 ~= 20 inches). Set by ilf.java:176, not consumed phone-side in 16.2  // confidence: silver [apk_static, wire_capture]
    optional uint32 pixel_aspect_ratio_e4 = 8;  // Pixel aspect ratio × 10000 (10000 = 1.0 = square pixels). Used for overlay coordinate correction (fvx.java) and layout rail sizing (hnt.java)  // confidence: silver [apk_static, wire_capture]
    optional uint32 real_density = 9;  // Actual DPI before Android bucket quantization. Used to rank video configs (prefer highest density). Calculated from physical display dimensions  // confidence: silver [apk_static, wire_capture]
    optional enums.MediaCodecType.Enum codec = 10;  // confidence: silver [apk_static, cross_version]
    optional AdditionalVideoConfig additional_config = 11; // APK: wcm (16.1) sub-message  // confidence: silver [apk_static, cross_version]
}
