/*
 * UI config request message — theming tokens (UiStyle key-value pairs).
 *
 * Wraps UiConfigData, which carries two lists of Material Design theming
 * token entries. HU->Phone only. Phone responds with UpdateHuUiConfigResponse
 * (0x8012, ThemingTokensStatus).
 *
 * Distinct from UpdateUiConfigRequest (wci, 0x8009/0x800A) which handles
 * runtime UI config (margins, theme, element visibility).
 *
 * APK class: wct (16.1) / wcj (16.2) — NOTE: wct in 16.2 = VideoFocusRequest!
 * Sub-messages: wco->wce (UiConfigData), wcq->wcg (UiConfigEntry), wcf (UiConfigValue)
 * Wire msg 0x8011, HU->Phone (video channel)
 * vdp internal name: MEDIA_MESSAGE_INTEGRATED_OVERLAY_SESSION_DATA_UPDATE
 * Handler: hum.mo19778c(UiStyle) -> huz.mo19796n(wcj) -> ied.m20106k(32785, wcj)
 */
syntax="proto2";

package oaa.proto.messages;

// APK class: wcf (16.2) — config entry value wrapper
// confidence: gold [deep_trace, handler_verified]
message UiConfigValue
{
    optional uint32 value = 1;  // confidence: gold [deep_trace]
}

// APK class: wcq (16.1) / wcg (16.2) — config entry with key and value
// NOTE: wcq in 16.2 = VideoFocusMode enum (different type entirely!)
// confidence: gold [deep_trace, handler_verified]
message UiConfigEntry
{
    optional string key = 1;  // confidence: gold [deep_trace]
    oneof value {
        UiConfigValue config_value = 2; // oneof message (type_id=60)  // confidence: gold [deep_trace]
    }
}

// APK class: wco (16.1) / wce (16.2) — config data with two lists of entries
// NOTE: wco in 16.2 = VideoResolution enum (different type entirely!)
// confidence: gold [deep_trace, handler_verified]
message UiConfigData
{
    repeated UiConfigEntry primary_configs = 1;  // confidence: gold [deep_trace]
    repeated UiConfigEntry secondary_configs = 2;  // confidence: gold [deep_trace]
}

// APK class: wct (16.1) / wcj (16.2)
// confidence: gold [deep_trace, handler_verified]
message UiConfigRequest
{
    optional UiConfigData config = 1;  // confidence: gold [deep_trace]
}
