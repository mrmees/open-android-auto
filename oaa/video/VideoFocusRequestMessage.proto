syntax="proto2";

import "oaa/video/VideoFocusModeEnum.proto";
import "oaa/video/VideoFocusReasonEnum.proto";

package oaa.proto.messages;

// APK class: wdd (16.1) / wct (16.2) — field 2 = focus_mode enum, field 3 = focus_reason enum, no field 1
// Wire msg 0x8007, HU->Phone (video channel)
// confidence: gold [deep_trace, handler_verified]
message VideoFocusRequest
{
    optional enums.VideoFocusMode.Enum focus_mode = 2;  // wcq enum  // confidence: gold [deep_trace]
    optional enums.VideoFocusReason.Enum focus_reason = 3;  // wcs enum  // confidence: gold [deep_trace]
}
